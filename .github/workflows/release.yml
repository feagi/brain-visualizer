name: Build and Publish Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (PEP440 format: x.x.x, x.x.xb1, x.x.xa1, x.x.xrc1)'
        type: string
        required: true

env:
  CARGO_TERM_COLOR: always
  GODOT_VERSION: 4.5.0
  BV_MAJOR_VERSION: "2"

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      bv_version: ${{ steps.validate.outputs.bv_version }}
      tag_name: ${{ steps.validate.outputs.tag_name }}
      is_prerelease: ${{ steps.validate.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        id: validate
        shell: bash
        run: |
          # Determine version
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG_NAME="v${VERSION}"
          elif [ "${{ github.event_name }}" == "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
            VERSION="${TAG_NAME#v}"
            echo "Triggered by release: $TAG_NAME"
          else
            echo "ERROR: Unexpected trigger"
            exit 1
          fi
          
          # Validate PEP440 format
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(a[0-9]+|b[0-9]+|rc[0-9]+)?$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Expected PEP440 format: x.x.x, x.x.xb1, x.x.xa1, or x.x.xrc1"
            exit 1
          fi
          
          # Validate major version
          BV_MAJOR=$(echo "$VERSION" | cut -d. -f1)
          if [ "$BV_MAJOR" != "${{ env.BV_MAJOR_VERSION }}" ]; then
            echo "❌ Major version ${BV_MAJOR} does not match gate ${{ env.BV_MAJOR_VERSION }}"
            exit 1
          fi
          
          # Determine if prerelease
          if [[ "$VERSION" =~ (a|b|rc)[0-9]+ ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi
          
          echo "✅ Version: $VERSION"
          echo "✅ Tag: $TAG_NAME"
          echo "✅ Prerelease: $IS_PRERELEASE"
          
          echo "bv_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT

  build-bv-remote:
    name: Build BrainVisualizer Remote (${{ matrix.platform }})
    needs: validate-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
            export_name: "Linux/X11"
            output_name: BrainVisualizer-Remote.x86_64
            package_name: BrainVisualizer-Remote-Linux.tar.gz
          - os: macos-latest
            platform: macOS
            export_name: "macOS"
            output_name: BrainVisualizer-Remote.app
            package_name: BrainVisualizer-Remote-macOS.zip
          - os: windows-latest
            platform: Windows
            export_name: "Windows Desktop"
            output_name: BrainVisualizer-Remote.exe
            package_name: BrainVisualizer-Remote-Windows.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update BVVersion timestamp
        shell: bash
        run: |
          # Update timestamp in BVVersion.gd before building
          TIMESTAMP=$(date +%s)
          
          # Update the correct BVVersion file (BrainVisualizer/BVVersion.gd)
          if [ -f "godot_source/BrainVisualizer/BVVersion.gd" ]; then
            # macOS sed needs backup extension, Linux doesn't care
            if [[ "${{ runner.os }}" == "macOS" ]]; then
              sed -i.bak "s/get: return [0-9]*/get: return $TIMESTAMP/" godot_source/BrainVisualizer/BVVersion.gd
              rm -f godot_source/BrainVisualizer/BVVersion.gd.bak
            else
              sed -i "s/get: return [0-9]*/get: return $TIMESTAMP/" godot_source/BrainVisualizer/BVVersion.gd
            fi
            echo "✅ Updated BVVersion.brain_visualizer_timestamp to: $TIMESTAMP"
            echo "File contents:"
            cat godot_source/BrainVisualizer/BVVersion.gd
          else
            echo "❌ ERROR: BVVersion.gd not found!"
            exit 1
          fi
          
          # Verify the update worked
          if grep -q "get: return $TIMESTAMP" godot_source/BrainVisualizer/BVVersion.gd; then
            echo "✅ Timestamp update verified"
          else
            echo "❌ ERROR: Timestamp update failed!"
            exit 1
          fi

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        id: rust-cache
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_extensions/*/target
          key: ${{ runner.os }}-rust-bv-${{ hashFiles('rust_extensions/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-bv-
            ${{ runner.os }}-rust-

      - name: Log Rust cache status
        shell: bash
        run: |
          if [ "${{ steps.rust-cache.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Rust cache HIT - using cached dependencies and target/"
            echo ""
            echo "Cache contents:"
            echo "Cargo registry size:"
            du -sh ~/.cargo/registry 2>/dev/null || echo "  Registry: N/A"
            echo ""
            echo "Target directories (should contain previous builds):"
            for dir in rust_extensions/*/target; do
              if [ -d "$dir" ]; then
                size=$(du -sh "$dir" 2>/dev/null | cut -f1)
                echo "  $dir: $size"
                # Check if release binaries exist
                find "$dir" -name "*.dll" -o -name "*.so" -o -name "*.dylib" 2>/dev/null | head -3 | while read -r bin; do
                  echo "    - $(basename "$bin")"
                done
              fi
            done
          else
            echo "⚠️  Rust cache MISS - will rebuild from scratch"
            echo "This will take longer (~10-15 min for first build)"
            echo ""
            echo "Checking if target directories exist:"
            ls -la rust_extensions/*/target 2>/dev/null || echo "  No target directories found (expected for cache miss)"
          fi

      - name: Install Godot (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_macos.universal.zip
          unzip -q Godot_v4.5-stable_macos.universal.zip
          sudo mv Godot.app /Applications/
          
          wget -q https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/4.5.stable"
          unzip -q Godot_v4.5-stable_export_templates.tpz
          mv templates/* "$HOME/Library/Application Support/Godot/export_templates/4.5.stable/"
          
          echo "GODOT=/Applications/Godot.app/Contents/MacOS/Godot" >> $GITHUB_ENV

      - name: Install Godot (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip
          unzip -q Godot_v4.5-stable_linux.x86_64.zip
          chmod +x Godot_v4.5-stable_linux.x86_64
          sudo mv Godot_v4.5-stable_linux.x86_64 /usr/local/bin/godot
          
          wget -q https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates/4.5.stable"
          unzip -q Godot_v4.5-stable_export_templates.tpz
          mv templates/* "$HOME/.local/share/godot/export_templates/4.5.stable/"
          
          echo "GODOT=godot" >> $GITHUB_ENV

      - name: Install Godot (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_win64.exe.zip" -OutFile "godot.zip"
          Expand-Archive -Path godot.zip -DestinationPath godot-install -Force
          Move-Item godot-install/Godot*.exe godot.exe -Force
          
          $templatesPath = "$env:APPDATA\Godot\export_templates\4.5.stable"
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz" -OutFile "templates.tpz"
          New-Item -ItemType Directory -Force -Path $templatesPath
          Expand-Archive -Path templates.tpz -DestinationPath temp-templates -Force
          Copy-Item temp-templates/templates/* $templatesPath -Force -Recurse
          
          echo "GODOT=$PWD\godot.exe" >> $env:GITHUB_ENV

      - name: Build Rust extensions (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd rust_extensions
          python3 build.py --release --no-clean
          
          # Verify universal binaries on macOS (should contain both arm64 and x86_64)
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "Verifying macOS universal binaries..."
            for lib in $(find godot_source/addons -name "*.dylib" -type f 2>/dev/null); do
              ARCHS=$(file "$lib" 2>/dev/null | grep -oE 'arm64|x86_64' | tr '\n' ' ' || echo "unknown")
              if echo "$ARCHS" | grep -q "arm64" && echo "$ARCHS" | grep -q "x86_64"; then
                echo "✅ $lib is universal (arm64 + x86_64)"
              else
                echo "⚠️  $lib architectures: $ARCHS (expected: arm64 x86_64)"
              fi
            done
          fi

      - name: Build Rust extensions (Windows)
        if: runner.os == 'Windows'
        run: |
          cd rust_extensions
          python build.py --release --no-clean

      - name: Verify Rust extensions are in place
        shell: bash
        run: |
          echo "Checking for Rust extensions after build.py..."
          
          # build.py copies to these locations
          DESERIALIZER_SOURCE="godot_source/addons/feagi_rust_deserializer/target/release"
          DESERIALIZER_LEGACY="godot_source/addons/FeagiCoreIntegration/target/release"
          SHARED_VIDEO_SOURCE="godot_source/addons/feagi_shared_video/target/release"
          TYPE_SYSTEM_DIR="godot_source/addons/FeagiCoreIntegration"
          
          # Check what files exist
          echo "Files in feagi_rust_deserializer:"
          ls -la "$DESERIALIZER_SOURCE" 2>/dev/null || echo "Directory not found"
          
          echo "Files in FeagiCoreIntegration (legacy):"
          ls -la "$DESERIALIZER_LEGACY" 2>/dev/null || echo "Directory not found"
          
          echo "Files in feagi_shared_video:"
          ls -la "$SHARED_VIDEO_SOURCE" 2>/dev/null || echo "Directory not found"
          
          echo "Files in FeagiCoreIntegration (type_system):"
          ls -la "$TYPE_SYSTEM_DIR"/*feagi_type_system* 2>/dev/null || echo "No type_system files found"
          
          # Verify required files exist (build.py should have copied them)
          DESERIALIZER_LIB=$(find "$DESERIALIZER_SOURCE" "$DESERIALIZER_LEGACY" -name "libfeagi_data_deserializer.*" -o -name "feagi_data_deserializer.dll" 2>/dev/null | head -1)
          SHARED_VIDEO_LIB=$(find "$SHARED_VIDEO_SOURCE" -name "libfeagi_shared_video.*" -o -name "feagi_shared_video.dll" 2>/dev/null | head -1)
          TYPE_SYSTEM_LIB=$(find "$TYPE_SYSTEM_DIR" -maxdepth 1 -name "libfeagi_type_system.*" -o -name "feagi_type_system.dll" 2>/dev/null | head -1)
          
          if [ -z "$DESERIALIZER_LIB" ]; then
            echo "❌ ERROR: feagi_data_deserializer library not found!"
            echo "Expected in: $DESERIALIZER_SOURCE or $DESERIALIZER_LEGACY"
            exit 1
          fi
          
          if [ -z "$SHARED_VIDEO_LIB" ]; then
            echo "❌ ERROR: feagi_shared_video library not found!"
            echo "Expected in: $SHARED_VIDEO_SOURCE"
            exit 1
          fi
          
          if [ -z "$TYPE_SYSTEM_LIB" ]; then
            echo "❌ ERROR: feagi_type_system library not found!"
            echo "Expected in: $TYPE_SYSTEM_DIR"
            exit 1
          fi
          
          echo "✅ All Rust extensions verified in place"

      - name: Import Godot resources
        shell: bash
        run: |
          cd godot_source
          echo "Importing Godot resources (fonts, SVGs, etc.)..."
          ${GODOT} --headless --import --quit || {
            echo "⚠️  Import step had warnings/errors, but continuing..."
            # Import may have warnings, check if critical files were imported
            if [ -d ".godot/imported" ]; then
              echo "✅ Import directory created"
              ls -la .godot/imported/ | head -10 || true
            fi
          }

      - name: Export Godot project
        shell: bash
        run: |
          cd godot_source
          mkdir -p ../exports
          echo "Exporting to: ../exports/${{ matrix.output_name }}"
          ${GODOT} --headless --export-release "${{ matrix.export_name }}" ../exports/${{ matrix.output_name }}

      - name: Create distribution package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd exports
          zip -r ${{ matrix.package_name }} BrainVisualizer-Remote.app

      - name: Create distribution package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd exports
          $files = @()
          if (Test-Path "BrainVisualizer-Remote.exe") { $files += "BrainVisualizer-Remote.exe" }
          if (Test-Path "BrainVisualizer-Remote.pck") { $files += "BrainVisualizer-Remote.pck" }
          $files += Get-ChildItem -Filter "*.dll" | Select-Object -ExpandProperty Name
          Compress-Archive -Path $files -DestinationPath ${{ matrix.package_name }} -Force

      - name: Create distribution package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd exports
          tar -czf ${{ matrix.package_name }} BrainVisualizer-Remote.x86_64

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: bv-${{ matrix.platform }}
          path: exports/${{ matrix.package_name }}
          retention-days: 1

  build-rust-binaries:
    name: Build Rust Binaries (${{ matrix.platform }})
    needs: validate-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
          - os: macos-latest
            platform: macOS
          - os: windows-latest
            platform: Windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        id: rust-cache
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_extensions/*/target
          key: ${{ runner.os }}-rust-bv-${{ hashFiles('rust_extensions/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-bv-
            ${{ runner.os }}-rust-

      - name: Log Rust cache status
        shell: bash
        run: |
          if [ "${{ steps.rust-cache.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Rust cache HIT - using cached dependencies and target/"
            echo ""
            echo "Cache contents:"
            echo "Cargo registry size:"
            du -sh ~/.cargo/registry 2>/dev/null || echo "  Registry: N/A"
            echo ""
            echo "Target directories (should contain previous builds):"
            for dir in rust_extensions/*/target; do
              if [ -d "$dir" ]; then
                size=$(du -sh "$dir" 2>/dev/null | cut -f1)
                echo "  $dir: $size"
                # Check if release binaries exist
                find "$dir" -name "*.dll" -o -name "*.so" -o -name "*.dylib" 2>/dev/null | head -3 | while read -r bin; do
                  echo "    - $(basename "$bin")"
                done
              fi
            done
          else
            echo "⚠️  Rust cache MISS - will rebuild from scratch"
            echo "This will take longer (~10-15 min for first build)"
            echo ""
            echo "Checking if target directories exist:"
            ls -la rust_extensions/*/target 2>/dev/null || echo "  No target directories found (expected for cache miss)"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Add macOS universal targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Build Rust extensions (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd rust_extensions
          python3 build.py --release --no-clean
          
          # Verify universal binaries on macOS
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "Verifying universal binaries..."
            for lib in $(find godot_source/addons -name "*.dylib" -type f); do
              if file "$lib" | grep -q "universal"; then
                echo "✅ $lib is universal (arm64 + x86_64)"
              else
                echo "⚠️  $lib is NOT universal - only $(file "$lib" | grep -oE 'arm64|x86_64' | head -1)"
              fi
            done
          fi

      - name: Build Rust extensions (Windows)
        if: runner.os == 'Windows'
        run: |
          cd rust_extensions
          python build.py --release --no-clean

      - name: Find and stage binaries
        shell: bash
        run: |
          echo "Finding Rust extension binaries..."
          
          # Create staging directory
          mkdir -p binaries-staging
          
          # Determine library prefix and extension based on platform
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            LIB_PREFIX=""
            LIB_EXT="dll"
            LIB_PATTERN="feagi_*.dll"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            LIB_PREFIX="lib"
            LIB_EXT="dylib"
            LIB_PATTERN="libfeagi_*.dylib"
          else
            LIB_PREFIX="lib"
            LIB_EXT="so"
            LIB_PATTERN="libfeagi_*.so"
          fi
          
          # Find and copy only the main extension libraries (exclude deps/)
          # Pattern 1: Standard location: rust_extensions/*/target/release/
          for ext in feagi_data_deserializer feagi_shared_video feagi_type_system; do
            # Look for the library file directly in target/release/ (not in deps/)
            lib_file="rust_extensions/$ext/target/release/${LIB_PREFIX}${ext}.${LIB_EXT}"
            if [ -f "$lib_file" ]; then
              cp -v "$lib_file" "binaries-staging/${LIB_PREFIX}${ext}.${LIB_EXT}"
            fi
          done
          
          # Pattern 2: Architecture-specific targets (Linux/Windows)
          # Linux: rust_extensions/*/target/x86_64-unknown-linux-gnu/release/
          # Windows: rust_extensions/*/target/x86_64-pc-windows-msvc/release/
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            for ext in feagi_data_deserializer feagi_shared_video feagi_type_system; do
              lib_file="rust_extensions/$ext/target/x86_64-unknown-linux-gnu/release/${LIB_PREFIX}${ext}.${LIB_EXT}"
              if [ -f "$lib_file" ]; then
                cp -v "$lib_file" "binaries-staging/${LIB_PREFIX}${ext}.${LIB_EXT}"
              fi
            done
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            for ext in feagi_data_deserializer feagi_shared_video feagi_type_system; do
              lib_file="rust_extensions/$ext/target/x86_64-pc-windows-msvc/release/${ext}.${LIB_EXT}"
              if [ -f "$lib_file" ]; then
                cp -v "$lib_file" "binaries-staging/${ext}.${LIB_EXT}"
              fi
            done
          fi
          
          # Pattern 3: Universal binaries on macOS
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            for ext in feagi_data_deserializer feagi_shared_video feagi_type_system; do
              universal_file="rust_extensions/$ext/target/universal_release.dylib"
              if [ -f "$universal_file" ]; then
                cp -v "$universal_file" "binaries-staging/lib${ext}.dylib"
              fi
            done
          fi
          
          echo ""
          echo "Binaries found in staging:"
          ls -lh binaries-staging/ || echo "No binaries found"
          
          if [ -z "$(ls -A binaries-staging/ 2>/dev/null)" ]; then
            echo ""
            echo "❌ ERROR: No binaries found to upload!"
            echo ""
            echo "Expected files:"
            echo "  - binaries-staging/${LIB_PREFIX}feagi_data_deserializer.${LIB_EXT}"
            echo "  - binaries-staging/${LIB_PREFIX}feagi_shared_video.${LIB_EXT}"
            echo "  - binaries-staging/${LIB_PREFIX}feagi_type_system.${LIB_EXT}"
            echo ""
            echo "Searching for target directories:"
            find rust_extensions -type d -name "target" 2>/dev/null | head -10
            echo ""
            echo "Searching for extension libraries:"
            find rust_extensions -type f -name "${LIB_PATTERN}" ! -path "*/deps/*" 2>/dev/null | head -20
            exit 1
          fi
          
          # Verify we have exactly 3 libraries
          LIB_COUNT=$(ls -1 binaries-staging/*.${LIB_EXT} 2>/dev/null | wc -l || echo "0")
          if [ "$LIB_COUNT" -ne 3 ]; then
            echo ""
            echo "⚠️  WARNING: Expected 3 libraries, found $LIB_COUNT"
            echo "Files in staging:"
            ls -lh binaries-staging/
          fi

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries-${{ matrix.platform }}
          path: binaries-staging/*
          if-no-files-found: error
          retention-days: 1

  package-rust-binaries:
    name: Package Rust Binaries
    needs: build-rust-binaries
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all rust binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: rust-binaries-*

      - name: Display downloaded binaries
        run: |
          echo "Downloaded binaries:"
          ls -lRh binaries/ || echo "No binaries directory found"
          
          # Check if we got all 3 platforms
          PLATFORMS=$(ls -d binaries/rust-binaries-* 2>/dev/null | wc -l || echo "0")
          echo "Found $PLATFORMS platform(s)"
          
          if [ "$PLATFORMS" -lt 3 ]; then
            echo "⚠️  WARNING: Expected 3 platforms (Linux, macOS, Windows), found $PLATFORMS"
            echo "Available artifacts:"
            ls -la binaries/ || true
          fi

      - name: Package binaries for release
        run: |
          mkdir -p release-packages
          
          ERRORS=0
          
          # Package Linux binaries
          if [ -d "binaries/rust-binaries-Linux" ] && [ -n "$(ls -A binaries/rust-binaries-Linux/*.so 2>/dev/null)" ]; then
            cd binaries/rust-binaries-Linux
            tar -czf ../../release-packages/rust-binaries-linux-x86_64.tar.gz *.so
            cd ../..
            echo "✅ Packaged Linux binaries"
          else
            echo "❌ ERROR: Linux binaries not found!"
            ERRORS=$((ERRORS + 1))
          fi
          
          # Package macOS binaries  
          if [ -d "binaries/rust-binaries-macOS" ] && [ -n "$(ls -A binaries/rust-binaries-macOS/*.dylib 2>/dev/null)" ]; then
            cd binaries/rust-binaries-macOS
            tar -czf ../../release-packages/rust-binaries-macos-universal.tar.gz *.dylib
            cd ../..
            echo "✅ Packaged macOS binaries"
          else
            echo "❌ ERROR: macOS binaries not found!"
            ERRORS=$((ERRORS + 1))
          fi
          
          # Package Windows binaries
          if [ -d "binaries/rust-binaries-Windows" ] && [ -n "$(ls -A binaries/rust-binaries-Windows/*.dll 2>/dev/null)" ]; then
            cd binaries/rust-binaries-Windows
            zip -r ../../release-packages/rust-binaries-windows-x86_64.zip *.dll
            cd ../..
            echo "✅ Packaged Windows binaries"
          else
            echo "❌ ERROR: Windows binaries not found!"
            ERRORS=$((ERRORS + 1))
          fi
          
          if [ $ERRORS -gt 0 ]; then
            echo "❌ Failed to package $ERRORS platform(s)"
            exit 1
          fi
          
          echo "✅ All binaries packaged successfully"
          ls -lh release-packages/

      - name: Upload rust binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries
          path: release-packages/*
          retention-days: 1

  upload-to-release:
    name: Upload Assets to Release
    needs: [validate-version, build-bv-remote, package-rust-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -lRh artifacts/

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ needs.validate-version.outputs.tag_name }}"
          echo "Uploading assets to release: $TAG_NAME"
          
          # Find all files to upload
          FILES=$(find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \))
          
          if [ -z "$FILES" ]; then
            echo "❌ ERROR: No files found to upload!"
            echo "Artifacts directory contents:"
            ls -lRh artifacts/ || true
            exit 1
          fi
          
          echo "Files to upload:"
          echo "$FILES"
          
          # Upload all files
          echo "$FILES" | while read -r file; do
            if [ -n "$file" ]; then
              echo "Uploading: $file"
              gh release upload "$TAG_NAME" "$file" --clobber || exit 1
            fi
          done
          
          echo "✅ Assets uploaded to release"
          
          # Verify upload succeeded
          echo "Verifying uploaded assets..."
          gh release view "$TAG_NAME" --json assets --jq '.assets[].name' || exit 1

  build-pypi-packages:
    name: Build PyPI Package (${{ matrix.platform }})
    needs: [validate-version, upload-to-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            download_artifact: BrainVisualizer-Remote-Linux
          - os: macos-latest
            platform: macos-arm64
            download_artifact: BrainVisualizer-Remote-macOS
            arch: arm64
          - os: macos-latest
            platform: macos-x86_64
            download_artifact: BrainVisualizer-Remote-macOS
            arch: x86_64
          - os: windows-latest
            platform: windows
            download_artifact: BrainVisualizer-Remote-Windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Download BV release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG_NAME="${{ needs.validate-version.outputs.tag_name }}"
          
          # Wait for assets to be available (retry up to 5 times)
          MAX_RETRIES=5
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES: Checking for assets..."
            
            # List available assets
            gh release view "$TAG_NAME" --json assets --jq '.assets[].name' || true
            
            # Try to download
            if gh release download "$TAG_NAME" --pattern "${{ matrix.download_artifact }}.*" --dir downloads/ 2>/dev/null; then
              echo "✅ Assets downloaded successfully"
              break
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "⏳ Assets not ready yet, waiting 10 seconds..."
              sleep 10
            fi
          done
          
          # Verify files were downloaded
          if [ ! -d "downloads" ] || [ -z "$(ls -A downloads/ 2>/dev/null)" ]; then
            echo "❌ ERROR: No assets downloaded!"
            echo "Available assets on release:"
            gh release view "$TAG_NAME" --json assets --jq '.assets[].name' || true
            exit 1
          fi
          
          ls -lh downloads/

      - name: Extract BV binary (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd downloads
          if ls *.tar.gz 1> /dev/null 2>&1; then
            tar -xzf *.tar.gz
          elif ls *.zip 1> /dev/null 2>&1; then
            unzip -q *.zip
          fi
          
          # For macOS, extract architecture-specific binary from universal app bundle
          if [[ "${{ matrix.platform }}" == "macos-arm64" ]] || [[ "${{ matrix.platform }}" == "macos-x86_64" ]]; then
            echo "Extracting ${{ matrix.arch }} architecture from universal app bundle..."
            
            # Find the app bundle
            APP_BUNDLE=$(find . -name "*.app" -type d | head -1)
            if [ -z "$APP_BUNDLE" ]; then
              echo "❌ ERROR: No .app bundle found!"
              exit 1
            fi
            
            # Extract architecture-specific executable from the app bundle
            EXECUTABLE="$APP_BUNDLE/Contents/MacOS/BrainVisualizer-Remote"
            if [ -f "$EXECUTABLE" ]; then
              # Create architecture-specific directory
              mkdir -p "BrainVisualizer-Remote-${{ matrix.arch }}.app/Contents/MacOS"
              
              # Extract architecture-specific slice using lipo
              lipo "$EXECUTABLE" -extract "${{ matrix.arch }}" -output "BrainVisualizer-Remote-${{ matrix.arch }}.app/Contents/MacOS/BrainVisualizer-Remote" || {
                echo "⚠️  lipo extract failed, trying ditto..."
                # Fallback: use ditto to copy and thin
                ditto --arch "${{ matrix.arch }}" "$APP_BUNDLE" "BrainVisualizer-Remote-${{ matrix.arch }}.app"
              }
              
              # Copy other necessary files (Info.plist, resources, etc.)
              if [ -f "$APP_BUNDLE/Contents/Info.plist" ]; then
                mkdir -p "BrainVisualizer-Remote-${{ matrix.arch }}.app/Contents"
                cp "$APP_BUNDLE/Contents/Info.plist" "BrainVisualizer-Remote-${{ matrix.arch }}.app/Contents/"
              fi
              
              # Copy Resources if they exist
              if [ -d "$APP_BUNDLE/Contents/Resources" ]; then
                cp -r "$APP_BUNDLE/Contents/Resources" "BrainVisualizer-Remote-${{ matrix.arch }}.app/Contents/"
              fi
              
              # Remove the original universal bundle
              rm -rf "$APP_BUNDLE"
              
              echo "✅ Extracted ${{ matrix.arch }} architecture"
              ls -lh "BrainVisualizer-Remote-${{ matrix.arch }}.app/Contents/MacOS/"
            else
              echo "❌ ERROR: Executable not found in app bundle: $EXECUTABLE"
              exit 1
            fi
          fi

      - name: Extract BV binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd downloads
          Expand-Archive -Path *.zip -DestinationPath . -Force

      - name: Package platform binary
        shell: bash
        run: |
          VERSION="${{ needs.validate-version.outputs.bv_version }}"
          
          cd feagi-bv-platform/feagi-bv-${{ matrix.platform }}
          
          # Update version in pyproject.toml
          sed -i.bak "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          
          # Copy binary
          # Handle macOS architecture-specific package names
          if [[ "${{ matrix.platform }}" == "macos-arm64" ]]; then
            PACKAGE_DIR="feagi_bv_macos_arm64"
          elif [[ "${{ matrix.platform }}" == "macos-x86_64" ]]; then
            PACKAGE_DIR="feagi_bv_macos_x86_64"
          else
            PACKAGE_DIR="feagi_bv_${{ matrix.platform }}"
          fi
          
          mkdir -p $PACKAGE_DIR/bin
          cp -r ../../downloads/* $PACKAGE_DIR/bin/
          
          # Check package size before building
          echo "Checking package contents size..."
          du -sh $PACKAGE_DIR/bin/ || echo "No bin directory yet"
          
          # Build wheel
          python -m build
          
          echo "Built wheel size:"
          ls -lh dist/
          
          # Check if wheel exceeds PyPI's 100MB limit
          WHEEL_SIZE=$(du -b dist/*.whl | cut -f1)
          SIZE_MB=$((WHEEL_SIZE / 1024 / 1024))
          echo "Wheel size: ${SIZE_MB} MB"
          
          if [ "$SIZE_MB" -gt 100 ]; then
            echo ""
            echo "⚠️  WARNING: Wheel size (${SIZE_MB} MB) exceeds PyPI's 100 MB limit!"
            echo ""
            echo "Options:"
            echo "1. Request file size limit increase from PyPI:"
            echo "   https://pypi.org/project/feagi-bv-macos/request-limit-increase/"
            echo "   Or email: pypi-support@python.org"
            echo ""
            echo "2. Reduce package size by:"
            echo "   - Compressing binaries more"
            echo "   - Removing unnecessary files"
            echo "   - Splitting into multiple packages"
            echo ""
            echo "The package will fail to upload to PyPI."
          fi

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: feagi-bv-platform/feagi-bv-${{ matrix.platform }}/dist/*.whl
          retention-days: 1

  build-meta-package:
    name: Build Meta Package
    needs: validate-version
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Update meta-package version
        run: |
          VERSION="${{ needs.validate-version.outputs.bv_version }}"
          
          cd feagi-bv-platform/feagi-bv-meta
          sed -i.bak "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          
          # Update dependencies in setup.py
          cat > setup.py << 'EOFPY'
          from setuptools import setup, find_packages
          import sys
          import platform
          
          def get_version():
              """Extract version from pyproject.toml."""
              try:
                  with open('pyproject.toml', 'r') as f:
                      for line in f:
                          if line.startswith('version ='):
                              return line.split('=')[1].strip().strip('"').strip("'")
              except FileNotFoundError:
                  pass
              return "1.0.0"
          
          VERSION = get_version()
          
          # Determine platform-specific dependency
          platform_deps = []
          if sys.platform.startswith('linux'):
              platform_deps = [f'feagi-bv-linux>={VERSION}']
          elif sys.platform == 'darwin':
              # Detect macOS architecture
              machine = platform.machine().lower()
              if machine in ('arm64', 'aarch64'):
                  platform_deps = [f'feagi-bv-macos-arm64>={VERSION}']
              elif machine in ('x86_64', 'amd64'):
                  platform_deps = [f'feagi-bv-macos-x86_64>={VERSION}']
              else:
                  # Fallback to arm64 (Apple Silicon is now default)
                  platform_deps = [f'feagi-bv-macos-arm64>={VERSION}']
          elif sys.platform == 'win32':
              platform_deps = [f'feagi-bv-windows>={VERSION}']
          
          setup(
              name="feagi-bv",
              version=VERSION,
              packages=find_packages(),
              install_requires=[
                  'feagi-core>=2.1.0',
                  'toml>=0.10.2',
              ] + platform_deps,
          )
          EOFPY
          
          
          python -m build
          ls -lh dist/

      - name: Upload meta wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-meta
          path: feagi-bv-platform/feagi-bv-meta/dist/*.whl
          retention-days: 1

  publish-to-pypi:
    name: Publish to PyPI
    needs: [validate-version, build-pypi-packages, build-meta-package]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/feagi-bv/
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: wheel-*

      - name: Display wheels
        run: |
          echo "Wheels to publish:"
          find wheels -name "*.whl" -exec ls -lh {} \;
          echo ""
          echo "Checking wheel sizes against PyPI's 100 MB limit:"
          find wheels -name "*.whl" -exec sh -c 'SIZE=$(du -b "$1" | cut -f1); SIZE_MB=$((SIZE / 1024 / 1024)); echo "  $1: ${SIZE_MB} MB"; if [ "$SIZE_MB" -gt 100 ]; then echo "    ⚠️  EXCEEDS 100 MB LIMIT!"; fi' _ {} \;

      - name: Verify PyPI configuration
        run: |
          echo "⚠️  IMPORTANT: PyPI configuration requirements"
          echo ""
          echo "1. TRUSTED PUBLISHERS: You need 6 trusted publishers configured"
          echo "   This workflow publishes 6 packages, each needs its own trusted publisher:"
          echo "   - feagi-bv (meta package)"
          echo "   - feagi-bv-linux"
          echo "   - feagi-bv-macos-arm64"
          echo "   - feagi-bv-macos-x86_64"
          echo "   - feagi-bv-windows"
          echo ""
          echo "   To configure: https://pypi.org/manage/account/publishing/"
          echo "   For each project, use:"
          echo "     - Owner: feagi"
          echo "     - Repository: brain-visualizer"
          echo "     - Workflow: .github/workflows/release.yml"
          echo "     - Environment: pypi"
          echo "     - PyPI project name: (different for each: feagi-bv, feagi-bv-linux, etc.)"
          echo ""
          echo "2. FILE SIZE LIMIT: Architecture-specific packages should be under 100 MB"
          echo "   If any package exceeds 100 MB, request limit increase:"
          echo "   - Go to: https://pypi.org/project/<package-name>/request-limit-increase/"
          echo "   - Or email: pypi-support@python.org"
          echo ""
          echo "See: https://docs.pypi.org/trusted-publishers/using-github-actions/"

      - name: Publish platform packages to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels/wheel-linux/
          skip-existing: true

      - name: Publish platform packages to PyPI (macOS arm64)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels/wheel-macos-arm64/
          skip-existing: true

      - name: Publish platform packages to PyPI (macOS x86_64)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels/wheel-macos-x86_64/
          skip-existing: true

      - name: Publish platform packages to PyPI (Windows)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels/wheel-windows/
          skip-existing: true

      - name: Publish meta package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels/wheel-meta/
          skip-existing: true

      - name: Summary
        run: |
          echo "✅ Successfully published feagi-bv ${{ needs.validate-version.outputs.bv_version }} to PyPI"
          echo ""
          echo "Install with:"
          echo "  pip install feagi-bv==${{ needs.validate-version.outputs.bv_version }}"
