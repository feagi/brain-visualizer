name: Publish feagi-bv Package

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bv_version:
        description: 'Brain Visualizer release tag (e.g., v1.2.3)'
        required: true
      target_repo:
        description: 'Target repository'
        type: choice
        required: true
        options:
          - testpypi
          - pypi

env:
  BV_MAJOR_VERSION: "1"  # Change this when moving to BV 2.x

jobs:
  validate-version:
    name: Validate BV Version
    runs-on: ubuntu-latest
    outputs:
      bv_version: ${{ steps.validate.outputs.bv_version }}
      target_repo: ${{ steps.validate.outputs.target_repo }}
    steps:
      - name: Determine version and target
        id: validate
        shell: bash
        run: |
          # Determine BV version
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            BV_TAG="${{ inputs.bv_version }}"
            TARGET_REPO="${{ inputs.target_repo }}"
          elif [ "${{ github.event_name }}" == "release" ]; then
            BV_TAG="${{ github.event.release.tag_name }}"
            # Production releases go to PyPI
            TARGET_REPO="pypi"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            BV_TAG="${{ github.ref_name }}"
            # Determine target based on tag
            if [[ "$BV_TAG" =~ -beta\. ]] || [[ "$BV_TAG" =~ -alpha\. ]]; then
              TARGET_REPO="testpypi"
            else
              TARGET_REPO="pypi"
            fi
          else
            echo "❌ Cannot determine version - unexpected trigger"
            exit 1
          fi
          
          # Extract version number (remove 'v' prefix if present)
          BV_VERSION="${BV_TAG#v}"
          echo "version=${BV_VERSION}" >> $GITHUB_OUTPUT
          
          # Extract major version
          BV_MAJOR=$(echo "$BV_VERSION" | cut -d. -f1)
          
          # Get the gating major version
          GATE_MAJOR="${{ env.BV_MAJOR_VERSION }}"
          
          echo "🔍 Brain Visualizer release: ${BV_TAG} (version: ${BV_VERSION})"
          echo "🔒 Major version gate: ${GATE_MAJOR}"
          echo "📦 Target repository: ${TARGET_REPO}"
          
          # Validate major version matches gate
          if [ "$BV_MAJOR" != "$GATE_MAJOR" ]; then
            echo "❌ ERROR: BrainVisualizer major version ${BV_MAJOR} does not match gate ${GATE_MAJOR}"
            echo "To process BV ${BV_VERSION}, update BV_MAJOR_VERSION in the workflow to '${BV_MAJOR}'"
            exit 1
          fi
          
          echo "✅ Version check passed: BV ${BV_VERSION} matches gate ${GATE_MAJOR}.x.x"
          
          echo "bv_version=${BV_VERSION}" >> $GITHUB_OUTPUT
          echo "target_repo=${TARGET_REPO}" >> $GITHUB_OUTPUT

  build-feagi-bv:
    name: Build feagi-bv wheel (${{ matrix.platform }})
    needs: validate-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
            download_artifact: BrainVisualizer-Remote-Linux
            binary_name: BrainVisualizer-Remote.x86_64
            feagi_bv_bin: linux/BrainVisualizer
          - os: macos-latest
            platform: macOS
            download_artifact: BrainVisualizer-Remote-macOS
            binary_name: BrainVisualizer-Remote.app
            feagi_bv_bin: macos/BrainVisualizer.app
          - os: windows-latest
            platform: Windows
            download_artifact: BrainVisualizer-Remote-Windows
            binary_name: BrainVisualizer-Remote.exe
            feagi_bv_bin: windows/BrainVisualizer.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools twine

      - name: Download BV release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BV_VERSION="${{ needs.validate-version.outputs.bv_version }}"
          BV_TAG="v${BV_VERSION}"
          
          echo "📦 Downloading BrainVisualizer ${BV_TAG} artifact: ${{ matrix.download_artifact }}"
          
          # Download release asset
          gh release download "$BV_TAG" --pattern "${{ matrix.download_artifact }}.*" --dir downloads/
          
          echo "Downloaded files:"
          ls -lh downloads/

      - name: Extract BV binary (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd downloads
          
          if [ -f "${{ matrix.download_artifact }}.tar.gz" ]; then
            tar -xzf "${{ matrix.download_artifact }}.tar.gz"
          elif [ -f "${{ matrix.download_artifact }}.zip" ]; then
            unzip -q "${{ matrix.download_artifact }}.zip"
          fi
          
          echo "Extracted contents:"
          ls -lRh

      - name: Extract BV binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd downloads
          
          if (Test-Path "${{ matrix.download_artifact }}.zip") {
            Expand-Archive -Path "${{ matrix.download_artifact }}.zip" -DestinationPath . -Force
          }
          
          Write-Host "Extracted contents:"
          Get-ChildItem -Recurse

      - name: Prepare feagi-bv package structure
        shell: bash
        run: |
          BV_VERSION="${{ needs.validate-version.outputs.bv_version }}"
          
          echo "📝 Updating feagi-bv version to ${BV_VERSION}"
          
          # Update version in pyproject.toml
          if [ "${{ runner.os }}" == "Windows" ]; then
            sed -i "s/^version = .*/version = \"${BV_VERSION}\"/" feagi-bv/pyproject.toml
          else
            sed -i.bak "s/^version = .*/version = \"${BV_VERSION}\"/" feagi-bv/pyproject.toml
            rm -f feagi-bv/pyproject.toml.bak
          fi
          
          echo "Updated pyproject.toml:"
          grep "^version = " feagi-bv/pyproject.toml

      - name: Copy BV binary to package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p feagi-bv/feagi_bv/bin/${{ matrix.platform == 'Linux' && 'linux' || 'macos' }}
          
          if [ "${{ runner.os }}" == "macOS" ]; then
            # Copy entire .app bundle for macOS
            cp -r downloads/${{ matrix.binary_name }} feagi-bv/feagi_bv/bin/macos/
          else
            # Copy Linux binary
            cp downloads/${{ matrix.binary_name }} feagi-bv/feagi_bv/bin/linux/BrainVisualizer
            chmod +x feagi-bv/feagi_bv/bin/linux/BrainVisualizer
          fi
          
          echo "✅ Copied BV binary to package"
          ls -lRh feagi-bv/feagi_bv/bin/

      - name: Copy BV binary to package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path feagi-bv/feagi_bv/bin/windows
          
          # Copy .exe and .pck files
          Copy-Item downloads/${{ matrix.binary_name }} feagi-bv/feagi_bv/bin/windows/ -Force
          
          # Copy .pck file if exists (embed_pck=false in export_presets.cfg)
          $pckFile = "downloads/BrainVisualizer-Remote.pck"
          if (Test-Path $pckFile) {
            Copy-Item $pckFile feagi-bv/feagi_bv/bin/windows/ -Force
            Write-Host "✅ Copied .pck file"
          }
          
          # Copy any DLL files (GDExtension dependencies)
          Get-ChildItem downloads/*.dll -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName feagi-bv/feagi_bv/bin/windows/ -Force
            Write-Host "✅ Copied DLL: $($_.Name)"
          }
          
          Write-Host "✅ Copied BV binary to package"
          Get-ChildItem -Path feagi-bv/feagi_bv/bin/ -Recurse

      - name: Build wheel
        shell: bash
        run: |
          cd feagi-bv
          python -m build --wheel
          
          echo "Built wheel:"
          ls -lh dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: feagi-bv-wheel-${{ matrix.platform }}
          path: feagi-bv/dist/*.whl
          retention-days: 7

  publish-feagi-bv:
    name: Publish feagi-bv to ${{ needs.validate-version.outputs.target_repo }}
    needs: [validate-version, build-feagi-bv]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: feagi-bv-wheel-*
          path: dist
          merge-multiple: true

      - name: Display wheels
        run: |
          echo "📦 Wheels to publish:"
          ls -lh dist/

      - name: Publish to TestPyPI
        if: needs.validate-version.outputs.target_repo == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.FEAGI_BV_TEST_PYPI_TOKEN }}
          packages-dir: dist/
          skip-existing: true

      - name: Publish to PyPI
        if: needs.validate-version.outputs.target_repo == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.FEAGI_BV_PYPI_TOKEN }}
          packages-dir: dist/

      - name: Summary
        run: |
          BV_VERSION="${{ needs.validate-version.outputs.bv_version }}"
          TARGET_REPO="${{ needs.validate-version.outputs.target_repo }}"
          
          echo "✅ Successfully published feagi-bv==${BV_VERSION} to ${TARGET_REPO}"
          echo ""
          echo "📦 Package: feagi-bv"
          echo "🏷️  Version: ${BV_VERSION}"
          echo "🎯 Repository: ${TARGET_REPO}"
          echo ""
          if [ "$TARGET_REPO" == "testpypi" ]; then
            echo "Test installation:"
            echo "  pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ feagi-bv==${BV_VERSION}"
          else
            echo "Installation:"
            echo "  pip install feagi-bv==${BV_VERSION}"
          fi
