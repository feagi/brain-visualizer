name: Build Brain Visualizer (macOS)

on:
  push:
    branches: [main, develop]
    paths:
      - 'brain-visualizer/**'
      - '.github/workflows/build-macos.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'brain-visualizer/**'
  workflow_dispatch:

env:
  GODOT_VERSION: "4.5-stable"
  GODOT_DOWNLOAD_URL: "https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_macos.universal.zip"
  GODOT_TEMPLATES_URL: "https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz"

jobs:
  build-macos:
    name: Build macOS Application
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-apple-darwin,aarch64-apple-darwin
      
      - name: Cache Rust Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            brain-visualizer/rust_extensions/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-${{ env.GODOT_VERSION }}-macos
      
      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          cd ~/godot
          wget -q "${{ env.GODOT_DOWNLOAD_URL }}" -O godot.zip
          unzip -q godot.zip
          rm godot.zip
          echo "GODOT_BIN=$(find ~/godot -name "Godot.app" -type d | head -1)/Contents/MacOS/Godot" >> $GITHUB_ENV
      
      - name: Set Godot Path (from cache)
        if: steps.cache-godot.outputs.cache-hit == 'true'
        run: |
          echo "GODOT_BIN=$(find ~/godot -name "Godot.app" -type d | head -1)/Contents/MacOS/Godot" >> $GITHUB_ENV
      
      - name: Install Godot Export Templates
        run: |
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/${{ env.GODOT_VERSION }}"
          cd "$HOME/Library/Application Support/Godot/export_templates/${{ env.GODOT_VERSION }}"
          wget -q "${{ env.GODOT_TEMPLATES_URL }}" -O templates.tpz
          unzip -q templates.tpz
          rm templates.tpz
          mv templates/* .
          rmdir templates
      
      - name: Verify Godot Installation
        run: |
          "$GODOT_BIN" --version
          ls -la "$HOME/Library/Application Support/Godot/export_templates/${{ env.GODOT_VERSION }}"
      
      - name: Build Rust Extensions
        working-directory: brain-visualizer/rust_extensions
        run: |
          echo "Building Rust extensions..."
          python3 build.py --release
          echo "Verifying builds..."
          ls -la */libfeagi_*.dylib || true
          find . -name "libfeagi_*.dylib" -exec file {} \;
      
      - name: Export macOS Application
        working-directory: brain-visualizer/godot_source
        run: |
          chmod +x export_macos.sh
          ./export_macos.sh "$GODOT_BIN"
      
      - name: Verify Export
        working-directory: brain-visualizer/godot_source
        run: |
          ls -lh Brain-Visualizer.dmg
          hdiutil attach Brain-Visualizer.dmg -mountpoint /tmp/bv-verify
          ls -la /tmp/bv-verify/
          ls -la /tmp/bv-verify/Brain-Visualizer.app/Contents/
          find /tmp/bv-verify/Brain-Visualizer.app -name "*.dylib"
          hdiutil detach /tmp/bv-verify
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrainVisualizer-macOS-${{ github.sha }}
          path: brain-visualizer/godot_source/Brain-Visualizer.dmg
          retention-days: 7
      
      - name: Upload Export Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: export-log-${{ github.sha }}
          path: brain-visualizer/godot_source/export.log
          retention-days: 3
  
  test-exported-app:
    name: Test Exported Application
    needs: build-macos
    runs-on: macos-latest
    
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: BrainVisualizer-macOS-${{ github.sha }}
      
      - name: Mount DMG and Test Launch
        run: |
          hdiutil attach Brain-Visualizer.dmg -mountpoint /tmp/bv-test
          
          echo "Testing app launch (will exit after 5 seconds)..."
          timeout 5s /tmp/bv-test/Brain-Visualizer.app/Contents/MacOS/Brain-Visualizer || true
          
          echo "Checking for Rust extension initialization..."
          if timeout 5s /tmp/bv-test/Brain-Visualizer.app/Contents/MacOS/Brain-Visualizer 2>&1 | grep -q "Initialize godot-rust"; then
            echo "✅ Rust extensions loaded"
          else
            echo "⚠️ Rust extensions may not have loaded"
          fi
          
          hdiutil detach /tmp/bv-test

